<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav class="navbar">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">Navbar</span>
    </div>
  </nav>
  <div class="container">
    <div class="row">
      <div class="col-sm-12 col-md-6 col-lg-4">
        <div class="card p-3 m-3">
          
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" aria-describedby="emailHelp">
            <div id="emailHelp" class="form-text"></div>
          </div>
          <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="3"></textarea>
          </div>

          <div class="mb-3 d-flex images justify-content-around">
            <img class="bgImg" onclick="selectImg('./images/one.jpg')" src="images/one.jpg" alt="">
            <img class="bgImg" onclick="selectImg('images/two.jpg')" src="images/two.jpg" alt="">
            <img class="bgImg" onclick="selectImg('images/three.jpg')" src="images/three.jpg" alt="">
            <img class="bgImg" onclick="selectImg('images/four.jpg')" src="images/four.jpg" alt="">
            <img class="bgImg" onclick="selectImg('images/five.avif')" src="images/five.avif" alt="">
          </div>

          <button onclick="post()" type="submit" class="btn btn-primary ms-auto">Post</button>
        </div>
      </div>
      
      <div class="col-sm-12 col-md-6 col-lg-8">
        <div id="posts" class="posts m-2"></div>
      </div>

    </div>
  </div>






  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <script src="app.js"></script>
</body>

</html>
